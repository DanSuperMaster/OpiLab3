tasks.register("different") {
    group = "lab"
    doLast {
        def changedFiles = getChangedFiles()
        if (changedFiles) {
            def targetFiles = file("fileTargets.txt").text
            def matches = changedFiles.findAll { name ->
                targetFiles.contains(name)
            }

            if (!matches.isEmpty()) {
                ("git add .").execute().waitForProcessOutput(System.out, System.err)
                ["git", "commit", "-m", "diff command active"].execute().waitForProcessOutput(System.out, System.err)
                ["git", "push"].execute()
            }
        }
    }
}


def getChangedFiles() {
    ByteArrayOutputStream systemOutStream = new ByteArrayOutputStream()
    ArrayList<String> files = new ArrayList<>()

    ("git diff --name-only --diff-filter=d HEAD~1").execute().waitForProcessOutput(systemOutStream, System.err)
    def allFiles = systemOutStream.toString().trim().split('\n')
    systemOutStream.close()

    for (file in allFiles) {
        if (file.endsWith(".java")) {
            files.add(file)
            println file
        }
    }
    files
}

tasks.register("env") {
    group = "lab"
    dependsOn "jar"

    def execOps = services.get(ExecOperations)

    doLast {
        def envProps = new Properties()
        def propsFile = file("env.properties")

        if (!propsFile.exists()) {
            throw new GradleException("Файл env.properties не найден! Создайте его в корне проекта.")
        }

        propsFile.withInputStream { envProps.load(it) }

        def javaHome = envProps.getProperty("java_home")
        def vmArgs = envProps.getProperty("vm_args", "").split(" ").toList()

        def archivePath = tasks.named("jar").get().archiveFile.get().asFile.absolutePath

        if (!javaHome) {
            throw new GradleException("В env.properties не указан java_home")
        }

        def javaExec = "${javaHome}/bin/java"

        println "Запуск в альтернативном окружении"
        println "JVM: $javaExec"
        println "Args: $vmArgs"

        execOps.exec {
            executable = javaExec
            args = vmArgs + ["-jar", archivePath]

            ignoreExitValue = true
        }
    }
}

tasks.register("history") {
    group = "lab"

    def execOps = services.get(ExecOperations)

    doLast {
        def brokenRevision = "git rev-parse HEAD".execute().text.trim()
        boolean success = false

        while (!success) {
            def current = "git rev-parse --short HEAD".execute().text.trim()
            println "Проверка ревизии $current"

            def compileProc = execOps.exec {
                commandLine "./gradlew", "clean", "compileJava"
                ignoreExitValue = true
            }

            if (compileProc.exitValue == 0) {
                success = true
                println "Успех! Ревизия $current стабильна."

                def diffFile = file("history_diff.txt")
                def diffContent = "git diff HEAD $brokenRevision".execute().text
                diffFile.text = diffContent

                println "Результат diff сохранен в ${diffFile.name}"
            } else {
                println "Сборка $current не удалась. Откатываемся..."

                def checkoutProc = exec {
                    commandLine "git", "checkout", "HEAD~1"
                    ignoreExitValue = true
                }

                if (checkoutProc.exitValue != 0) {
                    println "Ошибка: Дошли до первого коммита, стабильная версия не найдена."
                    break
                }
            }
        }
    }
}

