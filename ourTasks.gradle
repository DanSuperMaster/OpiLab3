tasks.register("team") {
    group = "lab"
    def execOps = services.get(ExecOperations)

    doLast {
        def originalRef = providers.exec {
            commandLine "git", "rev-parse", "--abbrev-ref", "HEAD"
        }.standardOutput.asText.get().trim()

        if (originalRef == "HEAD") {
            originalRef = providers.exec {
                commandLine "git", "rev-parse", "HEAD"
            }.standardOutput.asText.get().trim()
        }

        def revisions = providers.exec {
            commandLine "git", "rev-list", "-n", "2", "HEAD~1"
        }.standardOutput.asText.get().trim().split()

        def tempDir = file(".team_temp")
        tempDir.deleteDir()
        tempDir.mkdirs()

        revisions.each { hash ->
            println "\nРаботаем с ревизией: $hash"

            execOps.exec {
                commandLine "git", "checkout", hash
            }

            println "Сборка ревизии $hash..."
            def buildProc = execOps.exec {
                commandLine "./gradlew", "clean", "jar"
                ignoreExitValue = true
            }

            if (buildProc.exitValue == 0) {
                def libsDir = file("build/libs")
                if (libsDir.exists()) {
                    libsDir.listFiles().findAll { it.name.endsWith('.jar') }.each { jar ->
                        def shortHash = hash.take(7)
                        def destFile = new File(tempDir, "rev_${shortHash}_${jar.name}")
                        destFile.bytes = jar.bytes
                        println "Сохранен: ${destFile.name}"
                    }
                }
            } else {
                println "Ревизия $hash не собралась"
            }
        }

        println "\nВозврат на исходную ветку ($originalRef)..."
        execOps.exec { commandLine "git", "checkout", originalRef }

        if (tempDir.exists() && tempDir.listFiles()?.length > 0) {
            def zipArchive = file("build/team_revisions.zip")
            zipArchive.parentFile.mkdirs()
            ant.zip(destfile: zipArchive, basedir: tempDir)
            println "Архив создан: ${zipArchive.absolutePath}"
        }

        tempDir.deleteDir()
    }
}
